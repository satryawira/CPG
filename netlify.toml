[build]
  command   = "npm install && npx prisma generate"
  functions = "netlify/functions"
  publish   = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@prisma/client", ".prisma"]

[functions.api]
  included_files = [".prisma/**", "node_modules/.prisma/**", "node_modules/@prisma/client/**"]

# Route semua traffic ke function API
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true
