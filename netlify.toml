[build]
  command   = "npx prisma generate"
  functions = "netlify/functions"
  publish   = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@prisma/client", ".prisma"]

# Route semua traffic ke function API
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true
